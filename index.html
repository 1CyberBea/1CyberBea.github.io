<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      /* Dark purple at top fading to lighter purple/gray as you scroll */
      background: linear-gradient(180deg, #2e2340 0%, #574373 35%, #7c6a99 70%, #9c92b0 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #333;
    }

    /* Header bar */
    header {
      background-color: rgba(46, 35, 64, 0.85);
      padding: 20px 0;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    header h1 {
      color: white;
      margin: 0;
      font-size: 2.2em;
      letter-spacing: 1px;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1.2em;
      transition: color 0.2s ease;
    }
    nav a:hover {
      color: #e8bd3c;
    }

    /* Page content */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 40px;
      text-align: center;
    }

    .photo-frame {
      display: inline-block;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
    }

    .photo-frame img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .content h2 {
      color: #ffffff;
      margin-top: 40px;
      font-size: 1.8em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .content p {
      color: #f0f0f0;
      font-size: 1.1em;
      line-height: 1.6;
      max-width: 600px;
      margin: 10px auto 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bea Derby</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="resume.html">Resume</a>
      <a href="Projects_page.html">Projects</a>
      <a href="comments.html">Comment Board</a>
      <a href="https://www.linkedin.com/in/brendan-derby/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="Extras.html">Extras</a>
    </nav>
  </header>

  <div class="content">
    <div class="photo-frame">
      <img src="tampa.jpg" alt="Tampa skyline" width="1313" height="987">
    </div>
    <h2>Welcome!</h2>
    <p>This is my website with whatever I choose to fill it with. Thanks for visiting.</p>
  </div>
</body>
</html>

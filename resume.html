<!DOCTYPE html>
<html>
<head>
  <title>Resume</title>
  <style>
    body {
      margin: 0;
      background-color: #5E5E5E;
      font-family: Helvetica, Arial, sans-serif;
      text-align: center;
    }
    header {
      background-color: #574373;
      padding: 20px 0;
      text-align: center;
    }
    header h1 {
      color: white;
      margin: 0;
      font-size: 2.2em;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1.2em;
    }
    nav a:hover {
      color: #e8bd3c;
    }
    .content {
      padding: 40px;
    }

    /* frame pdf*/
    .resume-wrapper {
      max-width: 900px;
      margin: 0 auto;
      background: linear-gradient(180deg, #6b5590, #574373);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    .resume-wrapper embed {
      display: block;
      width: 100%;
      height: 80vh;
      max-height: 1100px;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .made-in-latex {
      color: #e8bd3c;
      margin-top: 16px;
      font-size: 1.1em;
      font-weight: normal;
    }

    .download-link {
      display: inline-block;
      margin-top: 20px;
      color: #ffffff;
      background-color: #574373;
      padding: 10px 22px;
      border-radius: 6px;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }
    .download-link:hover {
      background-color: #e8bd3c;
      color: #333;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bea Derby</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="resume.html">Resume</a>

      <a href="comments.html">Comment Board</a>
      <a href="https://www.linkedin.com/in/brendan-derby/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="Extras.html">Extras</a>
    </nav>
  </header>

  <div class="content">
    <div class="resume-wrapper">
      <embed src="DerbyBrendan_Resume.pdf" type="application/pdf">
    </div>
    <p class="made-in-latex">Made in LaTeX</p>
    <a class="download-link" href="DerbyBrendan_Resume.pdf" download>Download PDF</a>
  </div>

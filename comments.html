<!DOCTYPE html>
<html>
<head>
  <title>Comments</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      /* Dark purple at top fading to lighter purple/gray as you scroll */
      background: linear-gradient(180deg, #2e2340 0%, #574373 35%, #7c6a99 70%, #9c92b0 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Header bar */
    header {
      background-color: rgba(46, 35, 64, 0.85);
      padding: 20px 0;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    header h1 {
      color: white;
      margin: 0;
      font-size: 2.2em;
      letter-spacing: 1px;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1.2em;
      transition: color 0.2s ease;
    }
    nav a:hover {
      color: #e8bd3c;
    }

    /* Page content */
    .content {
      padding: 50px 40px;
      text-align: center;
    }

    .content h2 {
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    /* Frame around the comment widget */
    .comments-wrapper {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <header>
    <h1>Bea Derby</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="resume.html">Resume</a>
      <a href="Projects_page.html">Projects</a>
      <a href="comments.html">Comment Board</a>
      <a href="https://www.linkedin.com/in/brendan-derby/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="Extras.html">Extras</a>
    </nav>
  </header>
  <div class="content">
    <h2>Comment Board. Leave a trace here.</h2>

    <div class="comments-wrapper">
      <!-- Utterances comment section -->
      <div id="utterances-container"></div>
      <script src="https://utteranc.es/client.js"
          repo="1CyberBea/1CyberBea.github.io"
          issue-term="pathname"
          theme="icy-dark"
          crossorigin="anonymous"
          async>
      </script>
    </div>
  </div>
</body>
</html>

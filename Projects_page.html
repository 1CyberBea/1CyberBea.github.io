<!DOCTYPE html>
<html>
<head>
  <title>Projects</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      /* Dark purple at top fading to lighter purple/gray as you scroll */
      background: linear-gradient(180deg, #2e2340 0%, #574373 35%, #7c6a99 70%, #9c92b0 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Header bar */
    header {
      background-color: rgba(46, 35, 64, 0.85);
      padding: 20px 0;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    header h1 {
      color: white;
      margin: 0;
      font-size: 2.2em;
      letter-spacing: 1px;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1.2em;
      transition: color 0.2s ease;
    }
    nav a:hover {
      color: #e8bd3c;
    }

    /* Page content */
    .content {
      padding: 50px 40px;
      text-align: center;
    }

    .content > h1 {
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }

    /* Grid wrapper for project cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      justify-content: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Card container */
    .container {
      position: relative;
      width: 250px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .container:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.4);
    }

    /* Make images uniform size */
    .container img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      background-color: #ffffff; /* logos with transparent bg still read cleanly */
    }

    /* Button overlay on image */
    .container .btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      background-color: rgba(46, 35, 64, 0.85);
      color: white;
      font-size: 16px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      text-decoration: none;
      backdrop-filter: blur(2px);
      transition: background-color 0.2s ease;
    }

    .container .btn:hover {
      background-color: #e8bd3c;
      color: #333;
    }

    /* Section headers */
    h2, h3 {
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Responsive behavior */
    @media (max-width: 768px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
      .container {
        width: 90%;
      }
    }
  </style>
</head>
<body>

</html>

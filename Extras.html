<!DOCTYPE html>
<html>
<head>
  <title>Is That The</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      text-align: center;
      /* Dark purple at top fading to lighter purple/gray as you scroll */
      background: linear-gradient(180deg, #2e2340 0%, #574373 35%, #7c6a99 70%, #9c92b0 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* Header bar */
    header {
      background-color: rgba(46, 35, 64, 0.85);
      padding: 20px 0;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    header h1 {
      color: white;
      margin: 0;
      font-size: 2.2em;
      letter-spacing: 1px;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 20px;
      font-size: 1.2em;
      transition: color 0.2s ease;
    }
    nav a:hover {
      color: #e8bd3c;
    }

    /* Content */
    .content {
      padding: 50px 40px;
    }

    .photo-frame {
      display: inline-block;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(2px);
    }

    .photo-frame img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bea Derby</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="resume.html">Resume</a>
      <a href="Projects_page.html">Projects</a>
      <a href="comments.html">Comment Board</a>
      <a href="https://www.linkedin.com/in/brendan-derby/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="Extras.html">Extras</a>
    </nav>
  </header>
  <div class="content">
    <div class="photo-frame">
      <img src="Bite_of_87.png" alt="Bite of 87" width="720" height="960">
    </div>
  </div>
</body>
</html>
